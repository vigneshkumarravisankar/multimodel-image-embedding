<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Catalog Search</title>
    <style>
        :root {
            --bg: #0f1117;
            --surface: #1a1d27;
            --border: #2a2d3a;
            --text: #e4e4e7;
            --muted: #9ca3af;
            --accent: #6366f1;
            --accent-hover: #818cf8;
            --success: #22c55e;
            --tag-bg: #2a2d3a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }
        /* Header */
        .header {
            border-bottom: 1px solid var(--border);
            padding: 16px 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            background: var(--bg);
            z-index: 100;
        }
        .header h1 { font-size: 20px; font-weight: 600; }
        .header .badge {
            background: var(--accent);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
        }
        /* Tabs */
        .tabs {
            display: flex;
            gap: 0;
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
        }
        .tab {
            padding: 12px 24px;
            cursor: pointer;
            color: var(--muted);
            font-size: 14px;
            font-weight: 500;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }
        .tab:hover { color: var(--text); }
        .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
        /* Main layout */
        .main { padding: 24px 32px; max-width: 1400px; margin: 0 auto; }
        .panel { display: none; }
        .panel.active { display: block; }
        /* Search bar */
        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            align-items: stretch;
        }
        .search-box input[type="text"] {
            flex: 1;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .search-box input:focus { border-color: var(--accent); }
        .btn {
            background: var(--accent);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .btn:hover { background: var(--accent-hover); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }
        .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
        /* Filters row */
        .filters {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            align-items: center;
        }
        .filters label {
            font-size: 13px;
            color: var(--muted);
            font-weight: 500;
        }
        .filters select {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 13px;
            outline: none;
        }
        .filters select:focus { border-color: var(--accent); }
        .mode-toggle {
            display: flex;
            gap: 0;
            border: 1px solid var(--border);
            border-radius: 6px;
            overflow: hidden;
        }
        .mode-toggle button {
            background: transparent;
            border: none;
            color: var(--muted);
            padding: 8px 16px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .mode-toggle button.active {
            background: var(--accent);
            color: white;
        }
        /* Extracted info */
        .extracted-info {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 20px;
            display: none;
        }
        .extracted-info .label { color: var(--muted); font-size: 12px; margin-right: 8px; }
        .extracted-info .tag {
            display: inline-block;
            background: var(--tag-bg);
            border: 1px solid var(--border);
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            margin-right: 6px;
        }
        .extracted-info .tag.color-tag { border-color: var(--accent); color: var(--accent); }
        .extracted-info .tag.material-tag { border-color: var(--success); color: var(--success); }
        .extracted-info .tag.category-tag { border-color: #f59e0b; color: #f59e0b; }
        /* Results grid */
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 16px;
        }
        .result-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            overflow: hidden;
            transition: border-color 0.2s, transform 0.2s;
            cursor: pointer;
        }
        .result-card:hover { border-color: var(--accent); transform: translateY(-2px); }
        .result-card img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            background: #222;
        }
        .result-card .card-body { padding: 12px; }
        .result-card .product-name {
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 6px;
            line-height: 1.3;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .result-card .card-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            font-size: 11px;
        }
        .result-card .card-meta span {
            background: var(--tag-bg);
            padding: 2px 8px;
            border-radius: 10px;
            color: var(--muted);
        }
        .result-card .distance {
            font-size: 11px;
            color: var(--muted);
            margin-top: 6px;
        }
        /* Image upload */
        .upload-zone {
            border: 2px dashed var(--border);
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            margin-bottom: 20px;
            transition: border-color 0.2s;
            cursor: pointer;
        }
        .upload-zone:hover, .upload-zone.dragover { border-color: var(--accent); }
        .upload-zone p { color: var(--muted); font-size: 14px; }
        .upload-zone .icon { font-size: 36px; margin-bottom: 8px; }
        .upload-preview {
            display: none;
            margin-bottom: 20px;
            text-align: center;
        }
        .upload-preview img {
            max-width: 250px;
            max-height: 250px;
            border-radius: 10px;
            border: 1px solid var(--border);
        }
        .upload-preview .filename {
            color: var(--muted);
            font-size: 13px;
            margin-top: 8px;
        }
        /* Browse grid */
        .category-section { margin-bottom: 32px; }
        .category-section h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--accent);
        }
        .browse-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
        }
        .browse-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .browse-card:hover { border-color: var(--accent); }
        .browse-card img {
            width: 100%;
            aspect-ratio: 1;
            object-fit: cover;
            background: #222;
        }
        .browse-card .browse-name {
            padding: 6px 8px;
            font-size: 11px;
            color: var(--muted);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        /* Status */
        .status-bar {
            color: var(--muted);
            font-size: 13px;
            margin-bottom: 16px;
            min-height: 20px;
        }
        .loading { opacity: 0.6; }
        .spinner {
            display: inline-block;
            width: 14px; height: 14px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 6px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        /* Result count selector */
        .result-count { display: flex; align-items: center; gap: 8px; }
        .result-count label { font-size: 13px; color: var(--muted); }
        .result-count select {
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Product Catalog Search</h1>
        <span class="badge">{{ total_indexed }} products indexed</span>
    </div>

    <div class="tabs">
        <div class="tab active" data-tab="text">Text Search</div>
        <div class="tab" data-tab="image">Image Search</div>
        <div class="tab" data-tab="browse">Browse Catalog</div>
    </div>

    <div class="main">
        <!-- TEXT SEARCH PANEL -->
        <div class="panel active" id="panel-text">
            <div class="search-box">
                <input type="text" id="text-query" placeholder='Try "Black Teak Root Lunch Plate" or "woven cushion"...' autocomplete="off">
                <button class="btn" id="btn-text-search">Search</button>
            </div>

            <div class="filters">
                <div class="mode-toggle">
                    <button class="active" data-mode="smart">Smart</button>
                    <button data-mode="manual">Manual</button>
                </div>
                <div id="manual-filters" style="display:none; display:contents;">
                    <label>Category:</label>
                    <select id="filter-category">
                        <option value="">All</option>
                        {% for c in categories %}<option value="{{ c }}">{{ c }}</option>{% endfor %}
                    </select>
                    <label>Color:</label>
                    <select id="filter-color">
                        <option value="">All</option>
                        {% for c in colors %}<option value="{{ c }}">{{ c }}</option>{% endfor %}
                    </select>
                    <label>Material:</label>
                    <select id="filter-material">
                        <option value="">All</option>
                        {% for m in materials %}<option value="{{ m }}">{{ m }}</option>{% endfor %}
                    </select>
                </div>
                <div class="result-count">
                    <label>Results:</label>
                    <select id="n-results-text">
                        <option value="5">5</option>
                        <option value="10" selected>10</option>
                        <option value="20">20</option>
                    </select>
                </div>
            </div>

            <div class="extracted-info" id="extracted-info">
                <span class="label">Auto-detected:</span>
                <span id="extracted-tags"></span>
                <span class="label" style="margin-left:12px;">Embedding query:</span>
                <span id="extracted-query" style="color:var(--text);font-size:13px;"></span>
            </div>

            <div class="status-bar" id="text-status"></div>
            <div class="results-grid" id="text-results"></div>
        </div>

        <!-- IMAGE SEARCH PANEL -->
        <div class="panel" id="panel-image">
            <div class="upload-zone" id="upload-zone">
                <div class="icon">&#128247;</div>
                <p>Drag & drop an image here, or click to upload</p>
                <p style="font-size:12px;margin-top:4px;">JPG / PNG supported</p>
            </div>
            <input type="file" id="image-input" accept=".jpg,.jpeg,.png" style="display:none;">

            <div class="upload-preview" id="upload-preview">
                <img id="preview-img" src="" alt="Preview">
                <div class="filename" id="preview-filename"></div>
                <div style="margin-top:10px;">
                    <div class="result-count" style="justify-content:center;">
                        <label>Results:</label>
                        <select id="n-results-image">
                            <option value="5">5</option>
                            <option value="10" selected>10</option>
                            <option value="20">20</option>
                        </select>
                    </div>
                    <button class="btn" id="btn-image-search" style="margin-top:10px;">Find Similar</button>
                    <button class="btn btn-outline" id="btn-clear-image" style="margin-top:10px;">Clear</button>
                </div>
            </div>

            <div class="status-bar" id="image-status"></div>
            <div class="results-grid" id="image-results"></div>
        </div>

        <!-- BROWSE PANEL -->
        <div class="panel" id="panel-browse">
            <div class="status-bar" id="browse-status"></div>
            <div id="browse-container"></div>
        </div>
    </div>

    <script>
        // --- Tab switching ---
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
                tab.classList.add('active');
                document.getElementById('panel-' + tab.dataset.tab).classList.add('active');
                if (tab.dataset.tab === 'browse' && !browseFetched) loadBrowse();
            });
        });

        // --- Search mode toggle ---
        let searchMode = 'smart';
        document.querySelectorAll('.mode-toggle button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.mode-toggle button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                searchMode = btn.dataset.mode;
                const manualFilters = document.getElementById('manual-filters');
                manualFilters.style.display = searchMode === 'manual' ? 'contents' : 'none';
            });
        });
        // Start with manual filters hidden
        document.getElementById('manual-filters').style.display = 'none';

        // --- Render result cards ---
        function renderResults(container, results) {
            container.innerHTML = '';
            if (!results.length) {
                container.innerHTML = '<p style="color:var(--muted);">No results found.</p>';
                return;
            }
            results.forEach(r => {
                const meta = r.metadata;
                const card = document.createElement('div');
                card.className = 'result-card';
                card.innerHTML = `
                    <img src="/image?path=${encodeURIComponent(meta.image_path)}" alt="${meta.product_name}" loading="lazy">
                    <div class="card-body">
                        <div class="product-name" title="${meta.product_name}">${meta.product_name}</div>
                        <div class="card-meta">
                            <span>${meta.category}</span>
                            ${meta.color ? `<span>${meta.color}</span>` : ''}
                            ${meta.material ? `<span>${meta.material}</span>` : ''}
                            <span>${meta.sku}</span>
                        </div>
                        <div class="distance">Distance: ${r.distance.toFixed(4)}</div>
                    </div>
                `;
                // Click card to do image-to-image search
                card.addEventListener('click', () => {
                    catalogImageSearch(meta.image_path, meta.product_name);
                });
                container.appendChild(card);
            });
        }

        // --- TEXT SEARCH ---
        async function doTextSearch() {
            const query = document.getElementById('text-query').value.trim();
            if (!query) return;

            const nResults = document.getElementById('n-results-text').value;
            const status = document.getElementById('text-status');
            const grid = document.getElementById('text-results');
            const info = document.getElementById('extracted-info');

            status.innerHTML = '<span class="spinner"></span> Searching...';
            grid.innerHTML = '';
            info.style.display = 'none';

            const body = { query, n_results: parseInt(nResults), mode: searchMode };
            if (searchMode === 'manual') {
                body.category = document.getElementById('filter-category').value;
                body.color = document.getElementById('filter-color').value;
                body.material = document.getElementById('filter-material').value;
            }

            try {
                const resp = await fetch('/api/text-search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });
                const data = await resp.json();
                if (data.error) { status.textContent = 'Error: ' + data.error; return; }

                status.textContent = `Found ${data.results.length} results`;

                // Show extracted attributes for smart mode
                if (data.extracted) {
                    const e = data.extracted;
                    let tags = '';
                    if (e.color_filter) tags += `<span class="tag color-tag">Color: ${e.color_filter}</span>`;
                    if (e.material_filter) tags += `<span class="tag material-tag">Material: ${e.material_filter}</span>`;
                    if (e.category_filter) tags += `<span class="tag category-tag">Category: ${e.category_filter}</span>`;
                    if (tags) {
                        document.getElementById('extracted-tags').innerHTML = tags;
                        document.getElementById('extracted-query').textContent = `"${e.embed_query}"`;
                        info.style.display = 'block';
                    }
                }

                renderResults(grid, data.results);
            } catch (err) {
                status.textContent = 'Request failed: ' + err.message;
            }
        }

        document.getElementById('btn-text-search').addEventListener('click', doTextSearch);
        document.getElementById('text-query').addEventListener('keydown', e => {
            if (e.key === 'Enter') doTextSearch();
        });

        // --- IMAGE SEARCH (upload) ---
        const uploadZone = document.getElementById('upload-zone');
        const imageInput = document.getElementById('image-input');
        const preview = document.getElementById('upload-preview');
        let selectedFile = null;

        uploadZone.addEventListener('click', () => imageInput.click());
        uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('dragover'); });
        uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
        uploadZone.addEventListener('drop', e => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) handleImageFile(e.dataTransfer.files[0]);
        });
        imageInput.addEventListener('change', () => {
            if (imageInput.files.length) handleImageFile(imageInput.files[0]);
        });

        function handleImageFile(file) {
            selectedFile = file;
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById('preview-img').src = e.target.result;
                document.getElementById('preview-filename').textContent = file.name;
                uploadZone.style.display = 'none';
                preview.style.display = 'block';
            };
            reader.readAsDataURL(file);
        }

        document.getElementById('btn-clear-image').addEventListener('click', () => {
            selectedFile = null;
            uploadZone.style.display = '';
            preview.style.display = 'none';
            document.getElementById('image-results').innerHTML = '';
            document.getElementById('image-status').textContent = '';
        });

        document.getElementById('btn-image-search').addEventListener('click', async () => {
            if (!selectedFile) return;
            const nResults = document.getElementById('n-results-image').value;
            const status = document.getElementById('image-status');
            const grid = document.getElementById('image-results');

            status.innerHTML = '<span class="spinner"></span> Searching...';
            grid.innerHTML = '';

            const form = new FormData();
            form.append('image', selectedFile);
            form.append('n_results', nResults);

            try {
                const resp = await fetch('/api/image-search', { method: 'POST', body: form });
                const data = await resp.json();
                if (data.error) { status.textContent = 'Error: ' + data.error; return; }
                status.textContent = `Found ${data.results.length} similar products`;
                renderResults(grid, data.results);
            } catch (err) {
                status.textContent = 'Request failed: ' + err.message;
            }
        });

        // --- IMAGE SEARCH from catalog card click ---
        async function catalogImageSearch(imagePath, productName) {
            // Switch to image tab
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
            document.querySelector('.tab[data-tab="image"]').classList.add('active');
            document.getElementById('panel-image').classList.add('active');

            // Show preview
            document.getElementById('preview-img').src = '/image?path=' + encodeURIComponent(imagePath);
            document.getElementById('preview-filename').textContent = productName;
            uploadZone.style.display = 'none';
            preview.style.display = 'block';

            const nResults = document.getElementById('n-results-image').value;
            const status = document.getElementById('image-status');
            const grid = document.getElementById('image-results');

            status.innerHTML = '<span class="spinner"></span> Finding similar products...';
            grid.innerHTML = '';

            try {
                const resp = await fetch('/api/catalog-search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ image_path: imagePath, n_results: parseInt(nResults) }),
                });
                const data = await resp.json();
                if (data.error) { status.textContent = 'Error: ' + data.error; return; }
                status.textContent = `Found ${data.results.length} similar products`;
                renderResults(grid, data.results);
            } catch (err) {
                status.textContent = 'Request failed: ' + err.message;
            }
        }

        // --- BROWSE CATALOG ---
        let browseFetched = false;
        async function loadBrowse() {
            const status = document.getElementById('browse-status');
            const container = document.getElementById('browse-container');
            status.innerHTML = '<span class="spinner"></span> Loading catalog...';

            try {
                const resp = await fetch('/api/browse');
                const data = await resp.json();
                browseFetched = true;
                container.innerHTML = '';

                for (const [cat, items] of Object.entries(data.categories)) {
                    const section = document.createElement('div');
                    section.className = 'category-section';
                    section.innerHTML = `<h3>${cat} (${items.length})</h3>`;

                    const grid = document.createElement('div');
                    grid.className = 'browse-grid';

                    items.forEach(item => {
                        const card = document.createElement('div');
                        card.className = 'browse-card';
                        card.innerHTML = `
                            <img src="/image?path=${encodeURIComponent(item.image_path)}" alt="${item.product_name}" loading="lazy">
                            <div class="browse-name" title="${item.product_name}">${item.product_name}</div>
                        `;
                        card.addEventListener('click', () => {
                            catalogImageSearch(item.image_path, item.product_name);
                        });
                        grid.appendChild(card);
                    });

                    section.appendChild(grid);
                    container.appendChild(section);
                }
                status.textContent = '';
            } catch (err) {
                status.textContent = 'Failed to load catalog: ' + err.message;
            }
        }
    </script>
</body>
</html>
